<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Número Secreto</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- TELA INICIAL -->
  <div id="inicio" class="tela ativa">
    <h1>🎯 Número Secreto</h1>
    <p>Adivinhe o número entre 1 e 100</p>
    <button onclick="iniciar()">Começar</button>
  </div>

  <!-- TELA DO JOGO -->
  <div id="jogo" class="tela">
    <h2>Tentando descobrir...</h2>

    <div class="leds">
      <span class="led"></span>
      <span class="led"></span>
      <span class="led"></span>
      <span class="led"></span>
      <span class="led"></span>
    </div>

    <p>Olhe os alerts 👀</p>
  </div>

  <!-- TELA FINAL -->
  <div id="fim" class="tela">
    <h1>🏆 Acertou!</h1>
    <p id="resultado"></p>
    <button onclick="location.reload()">Jogar de novo</button>
  </div>

  <script src="app.js"></script>
  <script src="ui.js"></script>

</body>
</html>
