<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Jogo do Número Secreto</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="card">
    <h1>🎯 Número Secreto</h1>
    <p>Tente adivinhar o número entre <strong>1 e 100</strong></p>

    <button onclick="iniciarJogo()">Jogar</button>

    <p class="dica">💡 Dica: acompanhe no console também</p>
  </div>

  <script src="app.js"></script>

  <script>
    function iniciarJogo() {
      location.reload(); // reinicia o jogo (se quiser simplificar)
    }
  </script>

</body>
</html>
